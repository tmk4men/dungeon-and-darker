<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0c0a08">
<title>輪廻 -RINNE-</title>
<meta name="description" content="六道・十界をさまよう、ドット絵のエクストラクション型ダンジョンRPG。死ねば全てを失い、また人間界へ還る。スマホ横持ちで遊べるブラウザゲーム。">
<!-- OGP -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="輪廻 -RINNE-">
<meta property="og:title" content="輪廻 -RINNE-">
<meta property="og:description" content="六道・十界をさまよう、ドット絵のエクストラクション型ダンジョンRPG。死ねば全てを失い、また人間界へ還る。">
<meta property="og:url" content="https://tmk4men.github.io/dungeon-and-darker/">
<meta property="og:image" content="https://tmk4men.github.io/dungeon-and-darker/ogp.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:locale" content="ja_JP">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="輪廻 -RINNE-">
<meta name="twitter:description" content="六道・十界をさまよう、ドット絵のエクストラクション型ダンジョンRPG。">
<meta name="twitter:image" content="https://tmk4men.github.io/dungeon-and-darker/ogp.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Yuji+Syuku&family=Shippori+Mincho+B1:wght@500;600;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <canvas id="game"></canvas>
    <div id="vignette"></div>

    <!-- ダンジョンHUD -->
    <div id="hud">
      <div id="dmgflash"></div>
      <!-- 左上：HP/MP -->
      <div class="hud-vitals">
        <div class="vital hp"><div class="vlabel">HP</div><div class="vbar"><div id="hpfill" class="vfill"></div><span id="hptext"></span></div></div>
        <div class="vital mp"><div class="vlabel">MP</div><div class="vbar"><div id="mpfill" class="vfill"></div><span id="mptext"></span></div></div>
        <div id="runinfo" class="runinfo"></div>
      </div>
      <!-- 上中央：ゾーン収縮タイマー -->
      <div id="zoneinfo" class="zoneinfo"></div>
      <!-- 上中央：業（カルマ） -->
      <div id="karmainfo" class="karmainfo"></div>
      <!-- 左上：バッグ -->
      <button id="bagbtn" class="bagbtn"><span class="bag-ic">袋</span><span class="bag-ct">0/20</span></button>
      <!-- 中央：脱出ゲージ -->
      <div id="extract"></div>
      <!-- 右下：スキル＆ポーション -->
      <div id="skillbar"></div>
      <!-- 祭壇/聖域/階段 インタラクト -->
      <button id="interactbtn" class="interactbtn">祈る</button>
      <!-- 操作ヒント -->
      <div class="hint left-hint">移動</div>
      <div class="hint right-hint">スキル選択→ここをドラッグで攻撃</div>
    </div>

    <!-- メニュー類 -->
    <div id="overlay"></div>

    <!-- 通知 -->
    <div id="toast"></div>

    <!-- 縦持ち注意 -->
    <div id="rotate">横向きにしてプレイしてください</div>

    <!-- 質感オーバーレイ -->
    <div id="grain"></div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/data.js"></script>
  <script src="js/items.js"></script>
  <script src="js/save.js"></script>
  <script src="js/map.js"></script>
  <script src="js/sprites.js"></script>
  <script src="js/render.js"></script>
  <script src="js/input.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/game.js"></script>
  <script>
    // インタラクト（押下＝降りる/作法/開ける開始、離す＝開錠中断）
    const ib = document.getElementById('interactbtn');
    ib.addEventListener('pointerdown', (e) => { e.preventDefault(); e.stopPropagation(); Game.onInteractDown(); });
    ib.addEventListener('pointerup', (e) => { e.preventDefault(); Game.onInteractUp(); });
    ib.addEventListener('pointercancel', () => Game.onInteractUp());
    ib.addEventListener('pointerleave', () => Game.onInteractUp());
    // バッグ（持ち物）
    document.getElementById('bagbtn').addEventListener('click', (e) => { e.stopPropagation(); Game.openBag(); });
    // オーディオはユーザー操作で解放（モバイル対策）
    const unlock = () => { Audio2.init(); Audio2.resume(); window.removeEventListener('pointerdown', unlock); window.removeEventListener('keydown', unlock); };
    window.addEventListener('pointerdown', unlock);
    window.addEventListener('keydown', unlock);
  </script>
</body>
</html>
